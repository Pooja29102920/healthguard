<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0f766e"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>HealthGuard – Sign In</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="app.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;padding:0;min-height:100%;background:linear-gradient(145deg,#0f766e 0%,#0891b2 60%,#1d4ed8 100%);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif}
    body{display:flex;align-items:center;justify-content:center;padding:20px;min-height:100vh}
    .card{background:#fff;border-radius:24px;box-shadow:0 24px 64px rgba(0,0,0,.22);padding:32px 28px;width:100%;max-width:400px}
    .logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:8px}
    .logo-icon{width:48px;height:48px;background:linear-gradient(135deg,#0f766e,#0891b2);border-radius:14px;display:flex;align-items:center;justify-content:center}
    .logo-text{font-size:1.5rem;font-weight:800;font-family:Georgia,serif;color:#0f766e}
    .tagline{text-align:center;color:#94a3b8;font-size:.8rem;margin-bottom:28px}
    .tabs{display:flex;background:#f1f5f9;border-radius:12px;padding:4px;margin-bottom:24px;gap:4px}
    .tab{flex:1;padding:9px;border:none;background:none;border-radius:9px;font-size:.875rem;font-weight:600;cursor:pointer;font-family:inherit;color:#64748b;transition:all .18s}
    .tab.on{background:#fff;color:#0f766e;box-shadow:0 2px 8px rgba(0,0,0,.09)}
    .inp{display:block;width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:12px 14px;font-size:16px;outline:none;font-family:inherit;background:#fafafa;transition:border-color .2s;margin-bottom:12px}
    .inp:focus{border-color:#0f766e;background:#fff}
    select.inp{background:#fff}
    label{font-size:.78rem;font-weight:600;color:#64748b;display:block;margin-bottom:5px}
    .btn{display:block;width:100%;background:linear-gradient(135deg,#0f766e,#0891b2);color:#fff;border:none;border-radius:12px;padding:14px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .1s,opacity .2s;margin-top:4px}
    .btn:active{transform:scale(.97);opacity:.9}
    .err{color:#dc2626;font-size:.8rem;margin-top:10px;text-align:center;min-height:20px}
    .ok{color:#166534;font-size:.8rem;margin-top:10px;text-align:center;min-height:20px}
    .role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .role-opt{border:2px solid #e2e8f0;border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .18s}
    .role-opt.on{border-color:#0f766e;background:#f0fdfa}
    .role-opt input{display:none}
    .role-opt .ri{font-size:1.6rem;display:block;margin-bottom:5px}
    .role-opt .rl{font-size:.82rem;font-weight:700;color:#64748b}
    .role-opt.on .rl{color:#0f766e}
    .divider{text-align:center;color:#cbd5e1;font-size:.75rem;margin:4px 0 12px;position:relative}
    .divider::before,.divider::after{content:'';position:absolute;top:50%;width:38%;height:1px;background:#e2e8f0}
    .divider::before{left:0}.divider::after{right:0}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg width="26" height="26" fill="none" stroke="#fff" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
    </div>
    <span class="logo-text">HealthGuard</span>
  </div>
  <p class="tagline">Remote health monitoring — anywhere in the world</p>

  <div class="tabs">
    <button class="tab on" onclick="switchTab('login')">Sign In</button>
    <button class="tab"    onclick="switchTab('register')">Create Account</button>
  </div>

  <!-- LOGIN -->
  <div id="loginForm">
    <label>Email</label>
    <input id="lEmail" type="email" class="inp" placeholder="you@example.com" autocomplete="email"/>
    <label>Password</label>
    <input id="lPass" type="password" class="inp" placeholder="••••••••" autocomplete="current-password"/>
    <button class="btn" onclick="doLogin()">Sign In →</button>
    <div id="lMsg" class="err"></div>
  </div>

  <!-- REGISTER -->
  <div id="regForm" style="display:none">
    <label>Your Name</label>
    <input id="rName" type="text" class="inp" placeholder="Full name" autocomplete="name"/>
    <label>Email</label>
    <input id="rEmail" type="email" class="inp" placeholder="you@example.com" autocomplete="email"/>
    <label>Password</label>
    <input id="rPass" type="password" class="inp" placeholder="Min 6 characters" autocomplete="new-password"/>
    <label>I am a…</label>
    <div class="role-grid">
      <label class="role-opt on" id="rolePatientOpt">
        <input type="radio" name="role" value="patient" checked onchange="pickRole('patient')"/>
        <span class="ri">🧑‍⚕️</span><span class="rl">Patient</span>
      </label>
      <label class="role-opt" id="roleCgOpt">
        <input type="radio" name="role" value="caregiver" onchange="pickRole('caregiver')"/>
        <span class="ri">👩‍⚕️</span><span class="rl">Caregiver</span>
      </label>
    </div>
    <button class="btn" onclick="doRegister()">Create Account →</button>
    <div id="rMsg" class="err"></div>
  </div>
</div>

<script src="js/storage.js"></script>
<script>
  // Redirect if already logged in
  const _u = API.currentUser();
  if(_u){ window.location.href = _u.role==='caregiver' ? 'caregiver.html' : 'patient.html'; }

  let _role='patient';

  function switchTab(t){
    document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',i===(t==='login'?0:1)));
    document.getElementById('loginForm').style.display = t==='login'?'':'none';
    document.getElementById('regForm').style.display   = t==='register'?'':'none';
    document.getElementById('lMsg').textContent='';
    document.getElementById('rMsg').textContent='';
  }

  function pickRole(r){
    _role=r;
    document.getElementById('rolePatientOpt').classList.toggle('on',r==='patient');
    document.getElementById('roleCgOpt').classList.toggle('on',r==='caregiver');
  }

  async function doLogin(){
    const btn=event.target;btn.disabled=true;btn.textContent='Signing in…';
    const msg=document.getElementById('lMsg');msg.className='err';msg.textContent='';
    const r = await API.login(document.getElementById('lEmail').value, document.getElementById('lPass').value);
    btn.disabled=false;btn.textContent='Sign In →';
    if(r.ok){
      window.location.href = r.data.user.role==='caregiver' ? 'caregiver.html' : 'patient.html';
    } else {
      msg.textContent = r.data.error || 'Login failed.';
    }
  }

  async function doRegister(){
    const btn=event.target;btn.disabled=true;btn.textContent='Creating…';
    const msg=document.getElementById('rMsg');msg.className='err';msg.textContent='';
    const r = await API.register(
      document.getElementById('rName').value,
      document.getElementById('rEmail').value,
      document.getElementById('rPass').value,
      _role
    );
    btn.disabled=false;btn.textContent='Create Account →';
    if(r.ok){
      msg.className='ok';msg.textContent='Account created! Signing you in…';
      const r2 = await API.login(document.getElementById('rEmail').value, document.getElementById('rPass').value);
      if(r2.ok) window.location.href = r2.data.user.role==='caregiver' ? 'caregiver.html' : 'patient.html';
    } else {
      msg.textContent = r.data.error || 'Registration failed.';
    }
  }

  // Enter key support
  document.addEventListener('keydown', e=>{ if(e.key==='Enter'){ const lf=document.getElementById('loginForm'); lf.style.display!=='none'?doLogin():doRegister(); }});
</script>
</body>
</html>
